services:
  postgres:
    image: postgres:16-alpine
    container_name: kamay_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kamay_user
      POSTGRES_PASSWORD: kamay_pass
      POSTGRES_DB: kamay_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kamay_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
